services:
  travel-planner:
    build: .
    container_name: vn-travel-planner
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in your shell or .env file}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      # Persist FAISS index + SQLite across container restarts.
      - ./data:/app/data
    restart: unless-stopped
