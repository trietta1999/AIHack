services:
  travel-planner:
    build: .
    container_name: vn-travel-planner
    ports:
      - "8501:8501"
    environment:
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?Set AZURE_OPENAI_API_KEY in your shell or .env file}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-https://aiportalapi.stu-platform.live/jpe}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-07-01-preview}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-4o-mini}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    volumes:
      # Persist FAISS index + SQLite across container restarts.
      - ./data:/app/data
    restart: unless-stopped
